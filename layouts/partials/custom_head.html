<style>
body,div.post-body,h1,h2,h3,h4 {
  font-family: 'Microsoft Yahei', 'PingFang SC', 'Avenir', 'Segoe UI', 'Hiragino Sans GB', STHeiti, 'Microsoft Sans Serif', 'WenQuanYi Micro Hei', sans-serif;
}

/* Mermaid */
.mermaid {
  overflow-x: auto;
  text-align: center;
  margin: 1.5em 0;
}

/* Code block container */
div.highlight pre {
  border-radius: 6px;
  padding: 0;
  overflow-x: auto;
  border: 1px solid #ddd;
}

div.highlight code {
  background: none;
  padding: 16px;
}

/* Dark mode — invert Hugo's friendly inline styles to monokai-like appearance */
@media (prefers-color-scheme: dark) {
  div.highlight {
    filter: invert(0.88) hue-rotate(180deg);
  }
  /* Undo double-inversion for images inside code blocks */
  div.highlight img {
    filter: invert(1) hue-rotate(180deg);
  }
}
</style>

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
      ]
    });"></script>

<!-- Mermaid -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" crossorigin="anonymous"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({
      startOnLoad: true,
      theme: 'default',
      securityLevel: 'loose',
    });
  });
</script>
